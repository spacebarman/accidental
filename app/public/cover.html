<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualitzador de Portada - Accidental</title>
    <style>
      @font-face {
        font-family: "BarlowCondensed";
        src: url("/fonts/BarlowCondensed-Medium.ttf") format("truetype");
      }

      :root {
        --bg: #000000;
        --line: #323232;
        --fill: #d5d5d5;
        --text: #a9a9a9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        color: #ffffff;
        background-color: #000000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "BarlowCondensed", sans-serif;
      }

      .stage {
        width: min(84vmin, 1100px);
        z-index: 10;
      }

      .cover {
        width: 100%;
        aspect-ratio: 1;
        background: #000000;
        background-size: cover;
        background-position: center;
        border: 1px solid #222222;
      }

      .cover.waiting {
        background-image: none;
      }

      .waiting-label {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(7.5vmin + 24px);
        color: #868686;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: clamp(14px, 2vmin, 26px);
      }

      .progress {
        width: 100%;
        height: 10px;
        background: var(--line);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: var(--fill);
        transition: width 120ms linear;
      }

      .brand {
        margin-top: 0.7vmin;
        color: var(--text);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        font-size: clamp(18px, 2.25vmin, 34px);
      }

      .unlock-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.82);
        z-index: 100;
        padding: 4vw;
      }

      .unlock-overlay.visible {
        display: flex;
      }

      .unlock-message {
        border: 2px solid #d8d8d8;
        background: rgba(20, 20, 20, 0.95);
        max-width: 980px;
        padding: clamp(20px, 3.2vmin, 48px);
        text-align: center;
        font-size: clamp(22px, 3.2vmin, 56px);
        line-height: 1.25;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .unlock-message span {
        display: block;
        margin-top: 0.5em;
        color: #8d8d8d;
        font-size: 0.55em;
      }

      canvas#canvas {
        position: fixed;
        visibility: hidden;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <canvas id="canvas"></canvas>
    <script>

/* CANVAS ANIMATION START */


(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const gradient = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
    gradient.addColorStop(0, "transparent");
    gradient.addColorStop(0.05, "rgba(255, 255, 255, 0.02)");
    gradient.addColorStop(0.5, "rgba(255, 255, 255, 0.15)");
    gradient.addColorStop(0.9, "rgba(255, 255, 255, 0.02)");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;

    const CONFIG = {
        lineCount: 15,
        baseXSpread: 600,
        amplitudeMin: 200,
        amplitudeMax: 500,
        frequencyMin: 0.01,
        frequencyMax: 0.03,
        lineWidth: 60,
        opacityMin: 0.05,
        opacityMax: 0.1,
    };

    const colorDark = "black";
    const colorLight = "white";

    class Line {
        constructor(canvas, config) {
            this.canvas = canvas;
            this.config = config;
            this.reset();
        }

        reset() {
            this.baseX = (this.canvas.width / 2) + (Math.random() - 0.5) * 2 * this.config.baseXSpread;
            this.amplitude = Math.random() * (this.config.amplitudeMax - this.config.amplitudeMin) + this.config.amplitudeMin;
            this.frequency = Math.random() * (this.config.frequencyMax - this.config.frequencyMin) + this.config.frequencyMin;
            this.opacity = Math.random() * (this.config.opacityMax - this.config.opacityMin) + this.config.opacityMin;
            this.dir = 1;
        }

        getX(elapsed) {
            return this.baseX + this.dir * this.amplitude * Math.sin(2 * Math.PI * this.frequency * elapsed);
        }

        draw(ctx, elapsed) {
            const x = this.getX(elapsed);
            ctx.globalAlpha = this.opacity;
            ctx.fillRect(x - this.config.lineWidth / 2,
                0,
                this.config.lineWidth * Math.sin(2 * Math.PI * this.frequency * elapsed),
                this.canvas.height);
        }
    }

    class AnimationManager {
        constructor(canvas, ctx, config) {
            this.canvas = canvas;
            this.ctx = ctx;
            this.config = config;
            this.lines = [];
            this.startTime = Date.now();
        }

        init() {
            this.resize();
            window.addEventListener('resize', () => this.resize());
            this.animate();
        }

        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            this.startTime = Date.now();
            this.lines = Array.from({ length: this.config.lineCount }, () => new Line(this.canvas, this.config));
        }

        getElapsedSeconds(timestamp) {
            return (timestamp - this.startTime) / 1000;
        }

        clear() {
            this.ctx.fillStyle = colorDark;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }

        detectCollisions(elapsed) {
            const positions = this.lines.map((line, index) => ({
                index,
                x: line.getX(elapsed)
            }));

            const toRemove = new Set();
            for (let i = 0; i < positions.length; i++) {
                for (let j = i + 1; j < positions.length; j++) {
                    if (Math.abs(positions[i].x - positions[j].x) < this.config.lineWidth) {
                        toRemove.add(positions[i].index);
                        toRemove.add(positions[j].index);
                    }
                }
            }

            if (toRemove.size === 0) {
                return;
            }

            this.lines = this.lines.filter((_, index) => !toRemove.has(index));
            for (let i = 0; i < toRemove.size; i++) {
                this.lines.push(new Line(this.canvas, this.config));
            }
        }

        drawLines(elapsed) {
            this.ctx.fillStyle = gradient;
            for (const line of this.lines) {
                line.draw(this.ctx, elapsed);
            }
        }

        draw(timestamp) {
            this.clear();
            const elapsed = this.getElapsedSeconds(timestamp);
//            this.detectCollisions(elapsed);
            this.drawLines(elapsed);
        }

        animate() {
          if(true) {
            const tick = (timestamp) => {
                this.draw(timestamp);
                requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          } else {
            this.clear();
          }
        }
    }

    const manager = new AnimationManager(canvas, ctx, CONFIG);
    manager.init();
})();
/* CANVAS ANIMATION END */

    
    
    </script>

    <main class="stage">
      <div id="cover" class="cover waiting" aria-label="Portada actual de l'àlbum"></div>
      <div class="progress" aria-label="Progres de reproduccio">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="brand">SPACEBARMAN · ACCIDENTAL</div>
    </main>

    <div id="unlockOverlay" class="unlock-overlay visible" role="dialog" aria-live="polite">
      <div id="unlockMessage" class="unlock-message">
        Feu clic o premeu Espai/Retorn per habilitar la reproducció d'àudio
        <span>Obligatori després de cada arrencada</span>
      </div>
    </div>

    <script>
      const coverEl = document.getElementById("cover");
      const progressFill = document.getElementById("progressFill");
      const unlockOverlay = document.getElementById("unlockOverlay");
      const unlockMessage = document.getElementById("unlockMessage");
      const canvas = document.getElementById('canvas');

      const audio = new Audio();
      audio.preload = "auto";

      let tracks = [];
      let socket = null;
      let reconnectDelay = 1000;
      let reconnectTimer = null;

      let audioUnlocked = false;
      let hasUserActivatedAudio = false;
      let pendingPlay = null;
      let currentIndex = null;
      let lastStatusSentAt = 0;
      let announcedCoverOpen = false;

      const FALLBACK_UNLOCK_AUDIO = "/mp3/Spacebarman-Accidental-Song01.mp3";

      function wsUrl() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        return `${protocol}//${window.location.host}/ws`;
      }

      function isAudioActivelyPlaying() {
        return !audio.paused && !audio.ended;
      }

      function isPolicyLockError(error) {
        const name = error && typeof error === "object" ? error.name : "";
        return name === "NotAllowedError" || name === "SecurityError";
      }

      function showUnlockMessage(message) {
        if (hasUserActivatedAudio || isAudioActivelyPlaying()) {
          audioUnlocked = true;
          pendingPlay = null;
          hideUnlockMessage();
          return;
        }

        unlockMessage.firstChild.textContent = message;
        unlockOverlay.classList.add("visible");
      }

      function hideUnlockMessage() {
        unlockOverlay.classList.remove("visible");
      }

      async function unlockAudio() {
        audioUnlocked = true;

        const previousSrc = audio.src;
        const pendingTrack = pendingPlay && tracks[pendingPlay.index] ? tracks[pendingPlay.index] : null;
        const currentTrack = Number.isInteger(currentIndex) && tracks[currentIndex] ? tracks[currentIndex] : null;
        const unlockSource = (pendingTrack && pendingTrack.audio) || (currentTrack && currentTrack.audio) || FALLBACK_UNLOCK_AUDIO;

        if (!audio.src && tracks.length > 0) {
          audio.src = unlockSource;
        } else if (!audio.src) {
          audio.src = FALLBACK_UNLOCK_AUDIO;
        }

        const previousVolume = audio.volume;
        audio.volume = 0;

        try {
          await audio.play();
          audio.pause();
          audio.currentTime = 0;
          hasUserActivatedAudio = true;
        } catch (error) {
          if (isPolicyLockError(error)) {
            audioUnlocked = false;
            showUnlockMessage("Feu clic o premeu Espai/Retorn per habilitar la reproducció d'àudio");
          } else {
            audioUnlocked = hasUserActivatedAudio;
            hideUnlockMessage();
          }
          return;
        } finally {
          audio.volume = previousVolume;
        }

        if (!previousSrc && !pendingPlay) {
          audio.removeAttribute("src");
          audio.load();
        }

        hideUnlockMessage();

        if (pendingPlay) {
          const command = pendingPlay;
          pendingPlay = null;
          playTrack(command.index, command.startTime || 0);
        }
      }

      function connect() {
        socket = new WebSocket(wsUrl());

        socket.addEventListener("open", () => {
          reconnectDelay = 1000;
          send({ type: "hello", role: "cover" });

          if (!announcedCoverOpen) {
            announcedCoverOpen = true;
            send({
              type: "cover_opened",
              openEventId: createOpenEventId()
            });
          }

          send({ type: "sync_request" });
        });

        socket.addEventListener("message", (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            return;
          }

          handleMessage(message);
        });

        socket.addEventListener("close", () => {
          scheduleReconnect();
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      }

      function scheduleReconnect() {
        if (reconnectTimer) {
          return;
        }

        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          reconnectDelay = Math.min(reconnectDelay * 2, 8000);
          connect();
        }, reconnectDelay);
      }

      function handleMessage(message) {
        if (message.type === "album_manifest") {
          tracks = message.tracks || [];
          return;
        }

        if (message.type === "reset_session") {
          audio.pause();
          audio.currentTime = 0;
          currentIndex = null;
          coverEl.style.backgroundImage = "none";
          canvas.style.visibility = "hidden";
          coverEl.classList.add("waiting");
          progressFill.style.width = "0%";
          sendStatus(true);
          return;
        }

        if (message.type === "play_track") {
          playTrack(message.index, Number(message.startTime) || 0);
          return;
        }

        if (message.type === "stop_playback") {
          audio.pause();
          audio.currentTime = 0;
          currentIndex = null;
          pendingPlay = null;
          coverEl.style.backgroundImage = "none";
          canvas.style.visibility = "hidden";
          coverEl.classList.add("waiting");
          progressFill.style.width = "0%";
          hideUnlockMessage();
          sendStatus(true);
          return;
        }

        if (message.type === "state_update") {
          if (Number.isInteger(message.activeIndex)) {
            currentIndex = message.activeIndex;
            updateCover(currentIndex);
          }

          recoverPlaybackFromState(message);

          if (Number.isFinite(message.currentTime) && Number.isFinite(message.duration) && message.duration > 0) {
            const ratio = Math.min(100, Math.max(0, (message.currentTime / message.duration) * 100));
            progressFill.style.width = `${ratio}%`;
          }
        }
      }

      function recoverPlaybackFromState(message) {
        const stateIndex = Number.isInteger(message.activeIndex) ? message.activeIndex : null;
        if (stateIndex === null || !message.isPlaying || !tracks[stateIndex]) {
          return;
        }

        const track = tracks[stateIndex];
        const hasSameSource = Boolean(audio.src) && audio.src.endsWith(track.audio);
        const isActivelyPlaying = !audio.paused && !audio.ended;

        if (hasSameSource && isActivelyPlaying && currentIndex === stateIndex) {
          return;
        }

        if (pendingPlay && pendingPlay.index === stateIndex) {
          return;
        }

        // Recover audio after late join/reconnect when play_track may have been missed.
        const startTime = Number.isFinite(message.currentTime) && message.currentTime > 0
          ? Number(message.currentTime)
          : 0;
        playTrack(stateIndex, startTime);
      }

      function updateCover(index) {
        const track = tracks[index];
        if (!track) {
          return;
        }

        coverEl.style.backgroundImage = `url('${track.cover}')`;
        canvas.style.visibility = "visible";
        coverEl.classList.remove("waiting");
      }

      function playTrack(index, startTime) {
        if (!Number.isInteger(index) || !tracks[index]) {
          return;
        }

        currentIndex = index;
        updateCover(index);

        if (hasUserActivatedAudio) {
          audioUnlocked = true;
          pendingPlay = null;
          hideUnlockMessage();
        }

        if (!audioUnlocked && isAudioActivelyPlaying()) {
          audioUnlocked = true;
          pendingPlay = null;
          hideUnlockMessage();
        }

        if (!audioUnlocked) {
          pendingPlay = { index, startTime };
          showUnlockMessage("Feu clic o premeu Espai/Retorn per habilitar l'àudio i iniciar la reproducció");
          return;
        }

        const track = tracks[index];
        const shouldSwapSource = !audio.src || !audio.src.endsWith(track.audio);

        const playNow = () => {
          audio.play()
            .then(() => {
              audioUnlocked = true;
              hasUserActivatedAudio = true;
              pendingPlay = null;
              hideUnlockMessage();
            })
            .catch((error) => {
              if (isAudioActivelyPlaying()) {
                audioUnlocked = true;
                pendingPlay = null;
                hideUnlockMessage();
                return;
              }

              if (!hasUserActivatedAudio && isPolicyLockError(error)) {
                audioUnlocked = false;
                pendingPlay = { index, startTime };
                showUnlockMessage("Feu clic o premeu Espai/Retorn per habilitar l'àudio i continuar la reproducció");
                return;
              }

              audioUnlocked = hasUserActivatedAudio;
              pendingPlay = null;
              hideUnlockMessage();
            });
        };

        const applyStartTime = () => {
          if (
            Number.isFinite(startTime) &&
            startTime > 0 &&
            Number.isFinite(audio.duration) &&
            startTime < audio.duration
          ) {
            audio.currentTime = startTime;
          } else {
            audio.currentTime = 0;
          }
        };

        if (shouldSwapSource) {
          audio.src = track.audio;
        }

        if (Number.isFinite(startTime) && startTime > 0) {
          if (!Number.isFinite(audio.duration) || audio.duration <= 0) {
            audio.addEventListener(
              "loadedmetadata",
              () => {
                applyStartTime();
                playNow();
              },
              { once: true }
            );
            return;
          }

          applyStartTime();
          playNow();
          return;
        }

        audio.currentTime = 0;
        playNow();
      }

      function sendStatus(force) {
        const now = performance.now();
        if (!force && now - lastStatusSentAt < 250) {
          return;
        }

        lastStatusSentAt = now;

        send({
          type: "cover_status",
          activeIndex: currentIndex,
          isPlaying: !audio.paused && !audio.ended,
          currentTime: Number.isFinite(audio.currentTime) ? audio.currentTime : 0,
          duration: Number.isFinite(audio.duration) ? audio.duration : 0
        });
      }

      function send(payload) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(JSON.stringify(payload));
      }

      function createOpenEventId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }

        const stamp = Date.now();
        const random = Math.floor(Math.random() * 1000000);
        return `${stamp}-${random}`;
      }

      audio.addEventListener("timeupdate", () => {
        if (Number.isFinite(audio.duration) && audio.duration > 0) {
          const ratio = Math.min(100, Math.max(0, (audio.currentTime / audio.duration) * 100));
          progressFill.style.width = `${ratio}%`;
        } else {
          progressFill.style.width = "0%";
        }

        sendStatus(false);
      });

      audio.addEventListener("play", () => {
        audioUnlocked = true;
        hasUserActivatedAudio = true;
        pendingPlay = null;
        hideUnlockMessage();
        sendStatus(true);
      });

      audio.addEventListener("playing", () => {
        audioUnlocked = true;
        hasUserActivatedAudio = true;
        pendingPlay = null;
        hideUnlockMessage();
      });

      audio.addEventListener("pause", () => {
        sendStatus(true);
      });

      audio.addEventListener("ended", () => {
        progressFill.style.width = "0%";
        send({ type: "track_ended" });
      });

      unlockOverlay.addEventListener("click", () => {
        unlockAudio();
      });

      connect();

      window.addEventListener("keydown", (event) => {
        if (!unlockOverlay.classList.contains("visible")) {
            return;
        }

        if (event.code === "Space" || event.code === "Enter") {
            event.preventDefault();
            unlockAudio();
        }
        });
    </script>
  </body>
</html>
